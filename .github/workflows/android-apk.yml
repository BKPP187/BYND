name: Build Android APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'android/**'
      - 'index.html'
      - '*.js'
      - '*.css'
      - 'assets/**'
      - 'modules/**'
      - 'styles/**'
      - 'manifest.webmanifest'
      - 'bynd-icon.svg'

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build debug APK
        run: gradle -p android :app:assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BYND-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Prepare release keystore
        run: |
          echo "$BYND_KEYSTORE_BASE64" | base64 -d > android/bynd-release.keystore
          {
            echo "storeFile=bynd-release.keystore"
            echo "storeType=PKCS12"
            echo "storePassword=$BYND_KEYSTORE_PASSWORD"
            echo "keyAlias=bynd"
            echo "keyPassword=$BYND_KEYSTORE_PASSWORD"
          } > android/keystore.properties
        env:
          BYND_KEYSTORE_BASE64: ${{ secrets.BYND_KEYSTORE_BASE64 }}
          BYND_KEYSTORE_PASSWORD: ${{ secrets.BYND_KEYSTORE_PASSWORD }}

      - name: Build signed release APK
        run: gradle -p android :app:assembleRelease --no-daemon

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: BYND-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
