<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI OS 小酒馆</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="phone-container">
        
        <div class="status-bar">
            <span id="clock-time-small">--:--</span>
            <div class="status-right">
                <i class="ri-wifi-line"></i>
                <i class="ri-signal-tower-fill"></i>
                <div class="battery-group">
                    <span id="battery-level">--%</span>
                    <i id="battery-icon" class="ri-battery-line"></i>
                </div>
            </div>
        </div>

        <div id="lock-screen" class="lock-screen" onclick="unlockPhone()">
            <div class="ls-header">
                <div class="ls-clock" id="ls-big-clock">00:00</div>
                <div class="ls-date" id="ls-date">Loading...</div>
            </div>

            <div class="ls-collage">
                <div class="photo-card photo-left">
                    <div class="tape"></div> 
                    <img src="https://images.unsplash.com/photo-1620662736427-b8a198f52a4d?w=400&auto=format&fit=crop&q=60" class="user-img-1">
                    <div class="hand-write" id="ls-vibe-text">My Vibe</div>
                </div>

                <div class="photo-card photo-right">
                    <div class="clip-paper"><i class="ri-attachment-line"></i></div>
                    <img src="https://images.unsplash.com/photo-1515378791036-0648a3ef77b2?w=400&auto=format&fit=crop&q=60" class="user-img-2">
                    <i class="ri-star-smile-fill sticker-star"></i>
                </div>
            </div>

            <div class="ls-widgets">
                <div class="widget-pill"><i class="ri-sun-cloudy-line"></i><span>24°C</span></div>
                <div class="widget-pill music-pill">
                    <i class="ri-disc-line spin"></i>
                    <marquee scrollamount="3">Lover Boy - 8-Bit Remix</marquee>
                </div>
            </div>

            <div class="ls-footer">
                <div class="round-btn"><i class="ri-flashlight-fill"></i></div>
                <div class="swipe-hint"></div> 
                <div class="round-btn"><i class="ri-camera-fill"></i></div>
            </div>
        </div>

        <div id="home-screen" class="screen-content hidden">
            <div class="desktop-scroll-area">
                <div class="calendar-widget">
                    <div class="cal-left">
                        <div class="cal-day" id="cal-day-name">Thu</div>
                        <div class="cal-date" id="cal-date-num">16</div>
                    </div>
                    <div class="cal-right">
                        <div class="cal-month" id="cal-month-name">January</div>
                        <div class="cal-grid" id="cal-grid"></div>
                    </div>
                </div>

                <div class="bento-box">
                    <div class="apps-quad">
                        <div class="app-item" onclick="openApp('wechat')">
                            <div class="app-icon icon-black"><i class="ri-wechat-line"></i></div>
                            <span>微信</span>
                        </div>
                        <div class="app-item" onclick="openApp('regex')">
                            <div class="app-icon icon-black"><i class="ri-code-s-slash-line"></i></div>
                            <span>正则</span>
                        </div>
                        <div class="app-item" onclick="openApp('worldbook')">
                            <div class="app-icon icon-black"><i class="ri-book-read-line"></i></div>
                            <span>世界书</span>
                        </div>
                        <div class="app-item" onclick="openApp('settings')">
                            <div class="app-icon icon-black"><i class="ri-settings-4-line"></i></div>
                            <span>设置</span>
                        </div>
                    </div>
                    <div class="photo-large">
                        <img src="https://images.unsplash.com/photo-1555679427-1f6dfcce943b?w=500&auto=format&fit=crop&q=60" class="desktop-img-1">
                    </div>
                </div>

                <div class="bento-box">
                    <div class="photo-large">
                        <img src="https://images.unsplash.com/photo-1493246507139-91e8fad9978e?w=500&auto=format&fit=crop&q=60" alt="风景" class="desktop-img-2">
                    </div>

                    <div class="apps-quad">
                        <div class="app-item" onclick="openApp('theme')">
                            <div class="app-icon icon-black"><i class="ri-palette-line"></i></div>
                            <span>美化</span>
                        </div>
                        <div class="app-item" onclick="openApp('study')">
                            <div class="app-icon icon-black"><i class="ri-graduation-cap-line"></i></div>
                            <span>学习</span>
                        </div>
                        <div class="app-item" onclick="openApp('money')">
                            <div class="app-icon icon-black"><i class="ri-money-cny-box-line"></i></div>
                            <span>记账</span>
                        </div>
                        <div class="app-item" onclick="openApp('game')">
                            <div class="app-icon icon-black"><i class="ri-gamepad-line"></i></div>
                            <span>Game</span>
                        </div>
                    </div>
                </div>
            </div> 

            <div class="dock-bar">
                <div class="dock-item">
                    <div class="dock-icon-box"><i class="ri-music-2-fill"></i></div>
                    <span class="dock-label">音乐</span>
                </div>
                <div class="dock-item">
                    <div class="dock-icon-box"><i class="ri-safari-line"></i></div>
                    <span class="dock-label">浏览器</span>
                </div>
                <div class="dock-item">
                    <div class="dock-icon-box"><i class="ri-camera-lens-line"></i></div>
                    <span class="dock-label">相机</span>
                </div>
                <div class="dock-item" onclick="openApp('preset')">
                    <div class="dock-icon-box"><i class="ri-equalizer-line"></i></div>
                    <span class="dock-label">预设</span>
                </div>
            </div>
        </div>

        <div id="app-theme-window" class="app-window hidden">
            <div class="window-header">
                <span onclick="closeApp('theme')" class="close-btn">取消</span>
                <h3>个性化设置</h3>
                <span onclick="saveTheme()" class="save-btn">保存</span>
            </div>

            <div class="window-content">
                <div class="setting-card">
                    <div class="card-header">
                        <i class="ri-music-2-line card-icon"></i>
                        <span>底部滚动文字</span>
                    </div>
                    <div class="input-bubble">
                        <input type="text" id="input-music-text" placeholder="写一句你喜欢的歌词...">
                    </div>
                </div>

                <div class="setting-card">
                    <div class="card-header">
                        <i class="ri-lock-heart-line card-icon"></i>
                        <span>锁屏拍立得</span>
                    </div>
                    <div class="input-bubble">
                        <span class="bubble-label">文字</span>
                        <input type="text" id="input-vibe-text" placeholder="My Vibe">
                    </div>
                    <div class="upload-row">
                        <div class="upload-item">
                            <span class="sub-label">左图</span>
                            <div class="upload-box" onclick="document.getElementById('file-lock-1').click()">
                                <input type="text" id="input-lock-img-1" placeholder="链接 / 上传" readonly>
                                <div class="upload-icon"><i class="ri-image-add-line"></i></div>
                            </div>
                            <input type="file" id="file-lock-1" accept="image/*" style="display:none" onchange="convertFile(this, 'input-lock-img-1')">
                        </div>
                        <div class="upload-item">
                            <span class="sub-label">右图</span>
                            <div class="upload-box" onclick="document.getElementById('file-lock-2').click()">
                                <input type="text" id="input-lock-img-2" placeholder="链接 / 上传" readonly>
                                <div class="upload-icon"><i class="ri-image-add-line"></i></div>
                            </div>
                            <input type="file" id="file-lock-2" accept="image/*" style="display:none" onchange="convertFile(this, 'input-lock-img-2')">
                        </div>
                    </div>
                </div>

                <div class="setting-card">
                    <div class="card-header">
                        <i class="ri-image-line card-icon"></i>
                        <span>桌面大组件</span>
                    </div>
                    <div class="upload-stack">
                        <div class="upload-box wide" onclick="document.getElementById('file-desk-1').click()">
                            <span class="prefix">上图</span>
                            <input type="text" id="input-desk-img-1" placeholder="点击更换图片..." readonly>
                            <div class="upload-icon"><i class="ri-upload-cloud-2-line"></i></div>
                        </div>
                        <input type="file" id="file-desk-1" accept="image/*" style="display:none" onchange="convertFile(this, 'input-desk-img-1')">

                        <div class="upload-box wide" onclick="document.getElementById('file-desk-2').click()">
                            <span class="prefix">下图</span>
                            <input type="text" id="input-desk-img-2" placeholder="点击更换图片..." readonly>
                            <div class="upload-icon"><i class="ri-upload-cloud-2-line"></i></div>
                        </div>
                        <input type="file" id="file-desk-2" accept="image/*" style="display:none" onchange="convertFile(this, 'input-desk-img-2')">
                    </div>
                </div>

                <div class="setting-card">
                    <div class="card-header">
                        <i class="ri-apps-line card-icon"></i>
                        <span>图标更换</span>
                    </div>
                    <div class="icon-grid-pretty" id="icon-grid-container"></div>
                </div>
                <div style="height: 50px;"></div>
            </div>
        </div>

        <div id="app-wechat-window" class="app-window hidden" style="background: #ededed;">
            
            <div class="wechat-header">
                <div class="wc-header-left" onclick="closeApp('wechat')">
                    <i class="ri-arrow-left-s-line"></i>
                    <span>微信</span> 
                </div>
                <span class="wc-header-title">消息</span>
                <div class="wc-header-right">
                    <i class="ri-add-line" onclick="testAddCharacter()" style="font-size: 26px;"></i>
                </div>
            </div>

            <div id="wc-action-sheet" class="wc-action-sheet hidden">
                <div class="wc-sheet-content">
                    <div class="wc-sheet-item" onclick="triggerImport()">
                        <i class="ri-file-upload-line" style="color: #07c160;"></i>
                        <span>导入角色卡 (PNG)</span>
                        <input type="file" id="import-card-file" accept="image/*" style="display:none" onchange="handleFileSelect(this)">
                    </div>
                    <div class="wc-sheet-item" onclick="openCreateModal()">
                        <i class="ri-user-add-line" style="color: #2b2b2b;"></i>
                        <span>手动新建角色</span>
                    </div>
                    <div class="wc-sheet-cancel" onclick="hideActionSheet()">取消</div>
                </div>
            </div>

            <div id="wc-char-modal" class="wc-modal-overlay hidden">
                <div class="wc-char-card">
                    <div class="wc-card-header">
                        <span id="modal-title">新角色</span>
                        <i class="ri-close-line" onclick="closeCharModal()"></i>
                    </div>
                    <div class="wc-card-body">
                        <div class="wc-card-avatar-upload" onclick="document.getElementById('manual-avatar-input').click()">
                            <img id="modal-avatar-preview" src="">
                            <div class="upload-hint"><i class="ri-camera-fill"></i></div>
                            <input type="file" id="manual-avatar-input" accept="image/*" style="display:none" onchange="previewModalAvatar(this)">
                        </div>
                        <div class="wc-form-group">
                            <label>名字</label>
                            <input type="text" id="modal-char-name" placeholder="角色名字">
                        </div>
                        <div class="wc-form-group">
                            <label>开场白</label>
                            <textarea id="modal-char-intro" rows="3" placeholder="打个招呼吧..."></textarea>
                        </div>
                    </div>
                    <div class="wc-card-footer">
                        <button class="btn-confirm" onclick="confirmSaveCharacter()">确认添加</button>
                    </div>
                </div>
            </div>

            <div class="wechat-content">
                <div class="wc-search-box">
                    <div class="wc-search-inner"><i class="ri-search-line"></i> 搜索</div>
                </div>
                <div class="wc-chat-list" id="wc-chat-list"></div>
            </div>

            <div class="wc-tab-bar">
                <div class="wc-tab active"><i class="ri-message-3-fill"></i><span>微信</span></div>
                <div class="wc-tab"><i class="ri-contacts-book-2-line"></i><span>通讯录</span></div>
                <div class="wc-tab"><i class="ri-compass-3-line"></i><span>发现</span></div>
                <div class="wc-tab"><i class="ri-user-line"></i><span>我</span></div>
            </div>

            <div id="wechat-chat-room" class="wc-chat-room hidden">
                <div class="wc-room-header">
                    <i class="ri-arrow-left-s-line" onclick="closeChat()"></i>
                    <span class="wc-room-title" id="chat-room-title">...</span>
                    <i class="ri-more-fill"></i>
                </div>
                
                <div class="wc-room-content" id="chat-room-content"></div>

                <div class="wc-room-footer">
                    <i class="ri-voiceprint-line"></i>
                    <input type="text" class="wc-input">
                    <i class="ri-emotion-line"></i>
                    <i class="ri-add-circle-line"></i>
                </div>
            </div>

        </div>
        <div class="home-indicator"></div>
    </div>
    
    <script src="wechat.js"></script>
    <script src="theme.js"></script>
    <script src="script.js"></script>
</body>
</html>
